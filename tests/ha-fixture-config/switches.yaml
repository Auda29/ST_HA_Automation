# Test Switches (Template-based, toggle-fähig)
- platform: template
  switches:
    steckdose_wohnzimmer:
      friendly_name: "Steckdose Wohnzimmer"
      value_template: "{{ is_state('input_boolean.test_switch_1', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target:
          entity_id: input_boolean.test_switch_1
      turn_off:
        service: input_boolean.turn_off
        target:
          entity_id: input_boolean.test_switch_1
      icon_template: mdi:power-socket-de

    steckdose_kueche:
      friendly_name: "Steckdose Küche"
      value_template: "{{ is_state('input_boolean.test_switch_2', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target:
          entity_id: input_boolean.test_switch_2
      turn_off:
        service: input_boolean.turn_off
        target:
          entity_id: input_boolean.test_switch_2
      icon_template: mdi:power-socket-de
